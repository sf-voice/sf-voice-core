# sf-voice frontend — static SPA served by nginx-alpine.
# referenced from core/frontend/Dockerfile; copied to
# /etc/nginx/conf.d/default.conf, replacing the image default.

server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip — keep cheap defaults, brotli not bundled in nginx:alpine.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback. any path that isn't a real file falls through to
    # index.html so the client router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # hashed assets are immutable — cache for a year. rspack emits
    # `[name].[contenthash:8].js` per rspack.config.ts so this is safe.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # index.html is the only "mutable" entry. don't cache it so a deploy
    # actually rolls out to existing visitors on next nav.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
