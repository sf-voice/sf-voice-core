# installed at /srv/ellie-ai/docker-compose.yml on the droplet.
# the deploy script swaps the image tag and re-creates the `app` service.

services:
  app:
    image: ghcr.io/sf-voice/ellie-ai:latest
    container_name: ellie-ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PHX_HOST: ellie-ai.sf-voice.sh
      PHX_SERVER: "true"
      PORT: "4001"
      DATABASE_PATH: /data/ellie.db
      # secrets (SECRET_KEY_BASE, INTERNAL_API_TOKEN, OPENAI_API_KEY,
      # TELNYX_*, AWS_*, S3_BUCKET_NAME) come from .env, written on every
      # deploy by .github/workflows/ellie-ai.yml. local edits get overwritten.
    volumes:
      # host dir is owned by uid 65534 (nobody) so the container can write
      # to its sqlite db. created by bootstrap-ellie.sh.
      - ./data:/data
    expose:
      - "4001"
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
