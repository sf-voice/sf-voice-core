# per-pr preview stack.
#
# rendered by `sfctl preview deploy <preview-id> <api-tag> <frontend-tag> <host>`.
# each preview gets its own root under /srv/sf-voice/previews/<preview-id>.

name: sf-voice-${PREVIEW_ID}

services:
  frontend:
    image: ghcr.io/sf-voice/sf-voice-frontend:${FRONTEND_IMAGE_TAG}
    container_name: ${PREVIEW_ID}-frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    image: ghcr.io/sf-voice/sf-voice-api:${API_IMAGE_TAG}
    container_name: ${PREVIEW_ID}-api
    restart: unless-stopped
    env_file:
      - ./env/api.env
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      COOKIE_SECURE: "true"
    expose:
      - "8080"
    networks:
      - proxy_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6

  mysql:
    image: mysql:8.4
    container_name: ${PREVIEW_ID}-mysql
    restart: unless-stopped
    env_file:
      - ./env/mysql.env
    command:
      - "--innodb-buffer-pool-size=128M"
      - "--performance-schema=OFF"
      - "--max-connections=48"
    volumes:
      - ./data/mysql:/var/lib/mysql
    expose:
      - "3306"
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    container_name: ${PREVIEW_ID}-redis
    restart: unless-stopped
    env_file:
      - ./env/redis.env
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --aclfile
      - /usr/local/etc/redis/users.acl
    volumes:
      - ./data/redis:/data
      - ./env/redis.users.acl:/usr/local/etc/redis/users.acl:ro
    expose:
      - "6379"
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --user \"$${REDIS_USER}\" --pass \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12

networks:
  proxy_net:
    external: true
