# installed at /srv/frontend/docker-compose.yml on the droplet.
# the deploy script swaps the image tag and re-creates the `frontend`
# service. caddy reaches it as `frontend:3000` on proxy_net (see
# infra/deploy/Caddyfile → app.sf-voice.sh block).
#
# no env_file: it's a static site, the build is sealed at image-build
# time. compile-time env (if any) is threaded through docker build args
# in .github/workflows/frontend.yml.

services:
  frontend:
    image: ghcr.io/sf-voice/sf-voice-frontend:latest
    container_name: frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 6

networks:
  proxy_net:
    external: true
