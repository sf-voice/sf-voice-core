# installed at /srv/redis/docker-compose.yml on the droplet by bootstrap-redis.sh.
# no public port — only containers on proxy_net can reach redis:6379.
# api reaches it via REDIS_URL=redis://redis:6379 in docker-compose.api.yml.

services:
  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data:/data
    expose:
      - "6379"
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

networks:
  proxy_net:
    external: true
