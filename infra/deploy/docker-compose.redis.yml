# installed at /srv/redis/docker-compose.yml on the droplet by bootstrap-redis.sh.
# no public port — only containers on proxy_net can reach redis:6379.
# redis auth lives in /srv/redis/.env + /srv/redis/users.acl, both generated
# by bootstrap-redis.sh.

services:
  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    env_file:
      - .env
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --aclfile
      - /usr/local/etc/redis/users.acl
    volumes:
      - ./data:/data
      - ./users.acl:/usr/local/etc/redis/users.acl:ro
    expose:
      - "6379"
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --user \"$${REDIS_USER}\" --pass \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12

networks:
  proxy_net:
    external: true
