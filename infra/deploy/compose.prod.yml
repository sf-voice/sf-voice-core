# parent repo production stack: caddy (shared proxy) + ellie + resto.
# core services (api, frontend, mysql, redis) are owned by
# sf-voice/core and deployed via core's own sfctl + workflows.

name: sf-voice-apps

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/previews:/etc/caddy/previews:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy_net

  ellie-ai:
    image: ghcr.io/sf-voice/ellie-ai:${ELLIE_IMAGE_TAG:-latest}
    container_name: ellie-ai
    restart: unless-stopped
    env_file:
      - ./env/ellie.env
    environment:
      PHX_HOST: ellie-ai.sf-voice.sh
      PHX_SERVER: "true"
      PORT: "4001"
      DATABASE_PATH: /data/ellie.db
      RESTO_BASE_URL: http://resto-demo:4000
    volumes:
      - ./data/ellie:/data
    expose:
      - "4001"
    networks:
      - proxy_net

  resto-demo:
    image: ghcr.io/sf-voice/restaurant-booking-app:${RESTO_IMAGE_TAG:-latest}
    container_name: resto-demo
    restart: unless-stopped
    env_file:
      - ./env/resto.env
    environment:
      PHX_HOST: resto-demo.sf-voice.sh
      PHX_SERVER: "true"
      PORT: "4000"
      DATABASE_PATH: /data/resto.db
    volumes:
      - ./data/resto:/data
    expose:
      - "4000"
    networks:
      - proxy_net

volumes:
  caddy_data:
  caddy_config:

networks:
  proxy_net:
    external: true
