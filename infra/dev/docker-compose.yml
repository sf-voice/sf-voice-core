# local-only data layer for `mise run core:dev`. NOT used in production —
# the prod stack lives in infra/deploy/compose.prod.yml.
#
# mysql backs the new rust api service. qdrant stores vectors. clickhouse
# stores analytics-shaped data. redis is the local cache/queue dependency
# for api code that needs a shared ephemeral store.
#
# named volume so `docker compose down` preserves data; wipe with
# `docker compose -f infra/dev/docker-compose.yml down -v`.

name: sf-voice-dev

services:
  mysql:
    image: mysql:8.4
    container_name: sf-voice-mysql
    restart: unless-stopped
    command:
      # caching_sha2_password is the default auth plugin in 8.4 — no need
      # to set it. `--default-authentication-plugin` itself was removed
      # in 8.4 and aborts mysqld at startup if present.
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sf_voice_dev}
      MYSQL_USER: ${MYSQL_USER:-sf_voice}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sf_voice}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-sf_voice_root}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-sf_voice_root}"]
      interval: 3s
      timeout: 3s
      retries: 20
      # first-init runs mysqld --initialize which can take 20–40s on a
      # cold volume. start_period tells docker to ignore failing checks
      # during this window so they don't burn the retry budget.
      start_period: 45s

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: sf-voice-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && printf \"GET /readyz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q 200 <&3'"]
      interval: 5s
      timeout: 3s
      retries: 12

  clickhouse:
    image: clickhouse/clickhouse-server:25.1
    container_name: sf-voice-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-sf_voice_dev}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-sf_voice}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-sf_voice}
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --host 127.0.0.1 --user \"$${CLICKHOUSE_USER:-sf_voice}\" --password \"$${CLICKHOUSE_PASSWORD:-sf_voice}\" --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: sf-voice-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
    name: sf-voice-mysql-data
  qdrant_data:
    name: sf-voice-qdrant-data
  clickhouse_data:
    name: sf-voice-clickhouse-data
  redis_data:
    name: sf-voice-redis-data
