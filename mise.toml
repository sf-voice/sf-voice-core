
[tools]
erlang = "27.3.4"
elixir = "1.18.4-otp-27"
node = "22"
pnpm = "9"
rust = "stable"
duckdb = "latest"
"cargo:sea-orm-cli" = "2.0.0-rc.38"
gradle = "8.13"


[env]
"_".file = ".env"

[tasks.setup]
description = "first-time: deps, dbs, migrate, seed"
run = [
  "mix deps.get",
  "mix workspace.run -t ecto.create",
  "mix workspace.run -t ecto.migrate",
  "mise run seed",
]

[tasks.dev]
description = "elixir dev stack with ngrok"
run = """
set -e

# env-var validation lives in elixir — each app's `<App>.EnvCheck`
# runs on boot and halts with a clean banner if a required var is
# missing. nothing to do here at the shell layer.

if ! command -v ngrok >/dev/null 2>&1; then
  echo "ngrok not found — install with 'brew install ngrok' or see https://ngrok.com/download" >&2
  exit 1
fi

trap 'kill 0 2>/dev/null; pkill -P $$ 2>/dev/null; exit' EXIT INT TERM

# 1. boot ngrok in the background
ngrok http "$ELLIE_AI_PORT" --log=stdout > /tmp/ngrok-ellie.log 2>&1 &

# 2. wait for the local api to come up + grab the https tunnel url
echo "[ngrok] waiting for tunnel..."
url=""
for _ in $(seq 1 30); do
  url=$(curl -s http://127.0.0.1:4040/api/tunnels 2>/dev/null \\
        | grep -oE '"public_url":"https://[^"]+"' \\
        | head -1 \\
        | sed 's/.*"public_url":"//;s/"$//' || true)
  [ -n "$url" ] && break
  sleep 1
done

if [ -z "$url" ]; then
  echo "[ngrok] tunnel didn't open in 30s — see /tmp/ngrok-ellie.log" >&2
  exit 1
fi

# 3. persist NGROK_URL in the root .env so other terminals running
#    `mise run server:ellie` etc. pick it up too. replace-in-place so
#    we don't dogpile duplicate lines.
touch .env
grep -v '^NGROK_URL=' .env > .env.tmp 2>/dev/null || true
echo "NGROK_URL=$url" >> .env.tmp
mv .env.tmp .env
export NGROK_URL="$url"

echo "[ngrok] $url -> http://127.0.0.1:$ELLIE_AI_PORT"

# 4. spawn both phoenix apps with prefixed logs. NGROK_URL is in the env
#    via the export above; PORT vars come from the root `.env` mise loaded.
(cd apps/resto_booking_app && mix phx.server 2>&1 | sed -u 's/^/[resto] /') &
(cd apps/ellie_ai && mix phx.server 2>&1 | sed -u 's/^/[ellie] /') &
wait
"""

[tasks.test]
description = "run tests across every app"
run = "mix workspace.run -t test"

[tasks.ci]
description = "local CI: mirrors backend, frontend, and elixir CI pipelines exactly"
run = """
set -e

echo "[ci:install] elixir deps"
mix deps.get

echo "[ci:install] rust deps"
cargo fetch

echo "[ci:elixir] format check"
mix workspace.run -t format -- --check-formatted

echo "[ci:elixir] compile"
mix workspace.run -t compile -- --warnings-as-errors

echo "[ci:elixir] test"
mix workspace.run -t test

echo "[ci:rust] fmt check"
cargo fmt --all -- --check

echo "[ci:rust] clippy"
cargo clippy --bin sf-voice-api -- -D warnings

echo "[ci:rust] test"
cargo test --bin sf-voice-api

echo "[ci:frontend] install (frozen lockfile)"
pnpm install --frozen-lockfile --filter @sf-voice/frontend...

echo "[ci:frontend] typecheck"
pnpm --filter @sf-voice/frontend typecheck

echo "[ci:frontend] build"
pnpm --filter @sf-voice/frontend build

echo "[ci:sdk] running sdk checks"
mise run ci:sdk

echo "[ci] all checks passed."
"""

# ── sdk ci tasks ────────────────────────────────────────────────────────────
# each task covers one language sdk. run individually or via ci:sdk aggregator.

[tasks."ci:sdk:ts"]
description = "sdk ci: typescript (@sf-voice/media) — typecheck + build"
run = """
set -e
echo "[ci:sdk:ts] typecheck"
pnpm --filter @sf-voice/media typecheck
echo "[ci:sdk:ts] build"
pnpm --filter @sf-voice/media build
"""

[tasks."ci:sdk:go"]
description = "sdk ci: go — vet + build"
dir = "go"
run = """
set -e
echo "[ci:sdk:go] vet"
go vet ./...
echo "[ci:sdk:go] build"
go build ./...
"""

[tasks."ci:sdk:python"]
description = "sdk ci: python — build wheel via uv"
dir = "python"
run = """
set -e
echo "[ci:sdk:python] build"
uv build
"""

[tasks."ci:sdk:rust"]
description = "sdk ci: rust sdk (sf_voice_media) — clippy"
run = """
set -e
echo "[ci:sdk:rust] clippy"
cargo clippy -p sf_voice_media -- -D warnings
"""

[tasks."ci:sdk:java"]
description = "sdk ci: java — compileJava (requires gradle in mise tools)"
dir = "java"
run = """
set -e
echo "[ci:sdk:java] compileJava"
gradle compileJava --no-daemon --quiet
"""

[tasks."ci:sdk:kotlin"]
description = "sdk ci: kotlin — compileKotlin (requires gradle in mise tools)"
dir = "kotlin"
run = """
set -e
echo "[ci:sdk:kotlin] compileKotlin"
gradle compileKotlin --no-daemon --quiet
"""

[tasks."ci:sdk:cpp"]
description = "sdk ci: c++ — cmake configure (fetches nlohmann_json + cpr on first run)"
run = """
set -e
if ! command -v cmake >/dev/null 2>&1; then
  echo "[ci:sdk:cpp] cmake not found — install with: brew install cmake" >&2
  exit 1
fi
echo "[ci:sdk:cpp] cmake configure"
cmake -S cpp -B cpp/build \
  -DCMAKE_BUILD_TYPE=Release \
  -DSF_VOICE_EXAMPLES=OFF \
  --no-warn-unused-cli \
  -Wno-dev
"""

[tasks."ci:sdk"]
description = "sdk ci: all sdks — ts, go, python, rust, java, kotlin, cpp"
run = """
set -e
mise run ci:sdk:ts
mise run ci:sdk:go
mise run ci:sdk:python
mise run ci:sdk:rust
mise run ci:sdk:java
mise run ci:sdk:kotlin
mise run ci:sdk:cpp
echo "[ci:sdk] all sdk checks passed."
"""

# ── end sdk ci tasks ─────────────────────────────────────────────────────────

[tasks."test.watch"]
description = "watch mode: resto tests"
dir = "apps/resto_booking_app"
run = "mix test.watch"

[tasks.format]
description = "format: elixir (mix) + rust (cargo fmt)"
run = [
  "mix workspace.run -t format",
  "cargo fmt --all",
]

[tasks.compile]
description = "compile every app with --warnings-as-errors"
run = "mix workspace.run -t compile -- --warnings-as-errors"

[tasks.migrate]
description = "run pending migrations across every app"
run = "mix workspace.run -t ecto.migrate"

[tasks."migrate.rollback"]
description = "rollback last migration (resto)"
dir = "apps/resto_booking_app"
run = "mix ecto.rollback"

[tasks.seed]
description = "reseed dev dbs for both apps"
run = """
set -e
echo "[seed] resto:"
(cd apps/resto_booking_app && mix run priv/repo/seeds.exs)
echo "[seed] ellie:"
(cd apps/ellie_ai && mix run priv/repo/seeds.exs)
"""

[tasks.console]
description = "iex console for resto (no server)"
dir = "apps/resto_booking_app"
run = "iex -S mix"

[tasks."console:ellie"]
description = "iex console for ellie (no server)"
dir = "apps/ellie_ai"
run = "iex -S mix"

[tasks."sqlite:reset"]
description = "destructive: reset sqlite for both apps"
run = """
set -e
echo "[sqlite:reset] resto: drop + create + migrate + seed"
(cd apps/resto_booking_app && \\
  mix ecto.drop --force --quiet && \\
  mix ecto.create --quiet && \\
  mix ecto.migrate --quiet && \\
  mix run priv/repo/seeds.exs)
echo "[sqlite:reset] ellie: drop + create + migrate + seed"
(cd apps/ellie_ai && \\
  mix ecto.drop --force --quiet && \\
  mix ecto.create --quiet && \\
  mix ecto.migrate --quiet && \\
  mix run priv/repo/seeds.exs)
echo "[sqlite:reset] done."
"""

[tasks.deps]
description = "fetch + compile deps in every app"
run = [
  "mix deps.get",
  "mix workspace.run -t deps.compile",
]

[tasks."repo:pull"]
description = "pull + fast-forward core/ submodule"
run = "git pull --recurse-submodules"

[tasks."repo:submodules:bump-core"]
description = "bump core/ pin to latest origin/main"
run = """
set -e
git submodule update --remote --merge core

# stage the updated pin — if core was already current this will be empty
git add core
if git diff --cached --quiet; then
  echo "[repo:submodules:bump-core] core is already up to date"
  exit 0
fi

# include the new SHA in the message so git log is self-documenting
SHORT_SHA=$(cd core && git rev-parse --short HEAD)
git commit -m "chore: bump core to $SHORT_SHA"
git push
echo "[repo:submodules:bump-core] done"
"""

[tasks."repo:push"]
description = "push core/ then parent (in order)"
run = """
set -e

# core must be on the remote before the parent pushes the updated pin.
# if parent lands first with a SHA that doesn't exist on core's remote yet,
# CI's submodules:true checkout will fail with a 'reference not found' error.
echo "[repo:push] core..."
(cd core && git push)

echo "[repo:push] parent..."
git push

echo "[repo:push] done."
"""

[tasks."commit"]
description = "stage + commit both repos with the same message"
run = """
set -e
MSG="{{arg(i=0, name='message')}}"

echo "[commit] core..."
(cd core && git add -A && (git diff --cached --quiet || git commit -m "$MSG"))

# re-stage the updated submodule pin after core commits
git add core

echo "[commit] parent..."
git add -A
git diff --cached --quiet || git commit -m "$MSG"

echo "[commit] done — run: mise run repo:push"
"""

[tasks."ship"]
description = "stage, commit + push both repos"
run = """
set -e
MSG="{{arg(i=0, name='message')}}"

echo "[ship] staging core..."
(cd core && git add -A)

# no-op if core has nothing staged (e.g. already committed manually)
echo "[ship] committing core..."
(cd core && git diff --cached --quiet || git commit -m "$MSG")

# core must land on its remote before the parent pushes the updated pin
echo "[ship] pushing core..."
(cd core && git push)

# re-read the pin now that core has a new remote commit, stage it
git add core
echo "[ship] bumping parent pin..."
git diff --cached --quiet || git commit -m "chore: bump core — $MSG"

echo "[ship] pushing parent..."
git push

echo "[ship] done."
"""


[tasks."fraud:dev"]
description = "fraud-prototype: ngrok + webhook server"
run = """
set -e

if ! command -v ngrok >/dev/null 2>&1; then
  echo "ngrok not found — install with 'brew install ngrok'" >&2
  exit 1
fi

FRAUD_PORT=${SCAMMER_PORT:-4000}

trap 'kill 0 2>/dev/null; pkill -P $$ 2>/dev/null; exit' EXIT INT TERM

ngrok http "$FRAUD_PORT" --log=stdout > /tmp/ngrok-fraud.log 2>&1 &

echo "[ngrok] waiting for tunnel..."
url=""
for _ in $(seq 1 30); do
  url=$(curl -s http://127.0.0.1:4040/api/tunnels 2>/dev/null \
        | grep -oE '"public_url":"https://[^"]+"' \
        | head -1 \
        | sed 's/.*"public_url":"//;s/"$//' || true)
  [ -n "$url" ] && break
  sleep 1
done

if [ -z "$url" ]; then
  echo "[ngrok] tunnel didn't open in 30s — see /tmp/ngrok-fraud.log" >&2
  exit 1
fi

touch .env
grep -v '^PUBLIC_URL=' .env > .env.tmp 2>/dev/null || true
echo "PUBLIC_URL=$url" >> .env.tmp
mv .env.tmp .env
export PUBLIC_URL="$url"

echo "[ngrok] $url -> http://127.0.0.1:$FRAUD_PORT"
echo ""
echo "[fraud] paste this into Telnyx portal → Voice API App → webhook URL:"
echo "        $url/telnyx/webhook"
echo ""

(cd apps/fraud-prototype && pnpm dev 2>&1 | sed -u 's/^/[fraud] /') &
wait
"""

[tasks."fraud:scammer"]
description = "fraud-prototype: dial a scammer call (STAFF_PHONE_E164 from .env)"
dir = "apps/fraud-prototype"
run = "pnpm run scammer"

[tasks."docs:dev"]
description = "mintlify docs dev server (http://localhost:3000)"
dir = "docs"
run = "mintlify dev"

[tasks."web:dev"]
description = "frontend dev server"
dir = "core/frontend"
run = "pnpm dev"

[tasks."web:build"]
description = "frontend production build"
dir = "core/frontend"
run = "pnpm build"

[tasks."web:typecheck"]
description = "frontend type check"
dir = "core/frontend"
run = "pnpm typecheck"

[tasks."api:dev"]
description = "api dev server"
run = "cargo run -p sf-voice-api"

[tasks."api:build"]
description = "api release build"
run = "cargo build -p sf-voice-api --release"


[tasks."db:migrate"]
description = "run pending migrations"
dir = "core/backend"
run = "sea-orm-cli migrate up"

[tasks."db:migrate:status"]
description = "show migration status"
dir = "core/backend"
run = "sea-orm-cli migrate status"

[tasks."db:migrate:down"]
description = "roll back last migration"
dir = "core/backend"
run = "sea-orm-cli migrate down"

[tasks."db:migrate:fresh"]
description = "destructive: drop + reapply all migrations"
dir = "core/backend"
run = "sea-orm-cli migrate fresh"


[tasks.install]
description = "one-time bootstrap: all stacks"
run = """
set -e

echo "[install] mise tools"
mise install

echo "[install] elixir deps"
mix deps.get

echo "[install] js deps (pnpm — covers core/frontend + apps/fraud-prototype)"
pnpm install

echo "[install] rust deps (cargo fetch)"
cargo fetch

echo "[install] inference (placeholder — no python deps yet)"
# uv sync goes here once core/inference has real dependencies.

echo "[install] pull dev data-layer images"
docker compose -f infra/dev/docker-compose.yml pull

echo "[install] ensure duckdb data dir exists"
mkdir -p data

echo "[install] done."
"""

[tasks."core:dev"]
description = "full core dev stack"
run = """
set -e

COMPOSE="docker compose -f infra/dev/docker-compose.yml"

if ! command -v docker >/dev/null 2>&1; then
  echo "docker not found — install Docker Desktop or colima first" >&2
  exit 1
fi

trap 'kill 0 2>/dev/null; pkill -P $$ 2>/dev/null; exit' EXIT INT TERM

mkdir -p data

echo "[core:dev] starting data layer (mysql + qdrant)..."
# --wait blocks until every service with a healthcheck is healthy (or
# the timeout fires). much more reliable than polling `docker compose ps`
# json, which has fragile schemas across compose versions. healthcheck
# start_period in the compose file already gives cold-init enough room.
if ! $COMPOSE up -d --wait --wait-timeout 180; then
  echo "[core:dev] data layer didn't come up — recent logs:" >&2
  $COMPOSE logs --tail=40 mysql qdrant >&2 || true
  exit 1
fi
echo "[core:dev] data layer healthy"

# 3. banner with every url up front, so a slow cargo first-build doesn't
#    leave the user wondering where to look.
echo ""
echo "[core:dev] services:"
echo "  web     → http://localhost:3000   (app.sf-voice.sh)"
echo "  api     → http://localhost:8080   (api.sf-voice.sh)   curl /api/hello"
echo "  mysql   → mysql://sf_voice:sf_voice@127.0.0.1:3306/sf_voice_dev"
echo "  duckdb  → file: ./data/sf_voice.duckdb (open with: duckdb data/sf_voice.duckdb)"
echo "  qdrant  → http://127.0.0.1:6333   (REST)  http://127.0.0.1:6334 (gRPC)"
echo ""

# 4. app processes. each backgrounded with a sed prefix so logs interleave
#    cleanly. inference is a placeholder loop until there's real code.
(cd core/frontend && pnpm dev 2>&1 | sed -u 's/^/[web]    /') &
(cargo run -p sf-voice-api 2>&1 | sed -u 's/^/[api]    /') &
( while true; do echo "[inf]    scaffold — no inference process yet"; sleep 300; done ) &
wait
"""

[tasks."db:start"]
description = "start mysql dev container"
run = """
mkdir -p data
docker compose -f infra/dev/docker-compose.yml up -d
"""

[tasks."db:stop"]
description = "stop mysql dev container"
run = "docker compose -f infra/dev/docker-compose.yml down"

[tasks."db:nuke"]
description = "destructive: wipe mysql volume + duckdb"
run = """
docker compose -f infra/dev/docker-compose.yml down -v
rm -f data/sf_voice.duckdb data/sf_voice.duckdb.wal
"""

[tasks."db:reset"]
description = "destructive: reset sf_voice_dev db"
run = """
set -e
docker compose -f infra/dev/docker-compose.yml exec -T mysql \
  mysql -usf_voice -psf_voice \
  -e "DROP DATABASE IF EXISTS sf_voice_dev; CREATE DATABASE sf_voice_dev;"
rm -f data/sf_voice.duckdb data/sf_voice.duckdb.wal
echo "[db:reset] sf_voice_dev recreated; duckdb file cleared. next api boot will rebuild schema."
"""

[tasks."db:logs"]
description = "tail mysql container logs"
run = "docker compose -f infra/dev/docker-compose.yml logs -f"
