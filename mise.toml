# mise config for the sf-voice workspace. one source of truth for tool
# versions, env, and dev tasks. install mise first (https://mise.jdx.dev),
# then `mise install` from this dir to pin elixir + erlang to the
# versions CI uses, and `mise run …` for any task below.

# ── tool versions (match .github/workflows/*.yml so dev == ci) ───────────
[tools]
erlang = "27.3.4"
elixir = "1.18.4-otp-27"

# core stack tooling. pinning here so `mise install` provisions everything
# any task needs — no implicit dependency on whatever's globally installed
# on the dev machine. when these versions move in CI, update here too.
node = "22"
pnpm = "9"
rust = "stable"
# duckdb cli — useful for poking the embedded store from the shell
# (e.g. `duckdb data/sf_voice.duckdb` then `SHOW TABLES;`).
duckdb = "latest"

# ── env ──────────────────────────────────────────────────────────────────
# single root `.env` is the source of truth for every var, every app,
# every shell. mise loads it on cd-into and on every `mise run …`.
# `mise run dev` writes dynamic values (e.g. NGROK_URL) back into this
# same file so they survive across terminals.
[env]
"_".file = ".env"

# ── tasks ────────────────────────────────────────────────────────────────
# run any task with `mise run <name>`, or list with `mise tasks`.

[tasks.setup]
description = "first-time setup: install deps, create dbs, migrate, seed"
run = [
  "mix deps.get",
  "mix workspace.run -t ecto.create",
  "mix workspace.run -t ecto.migrate",
  "mise run seed",
]

[tasks."server:resto"]
description = "run resto_booking_app with iex (port from RESTO_BOOKING_APP_PORT)"
dir = "apps/resto_booking_app"
run = "iex -S mix phx.server"

[tasks."server:ellie"]
description = "run ellie_ai with iex (port from ELLIE_AI_PORT)"
dir = "apps/ellie_ai"
run = "iex -S mix phx.server"

[tasks.dev]
description = "full local stack: ngrok tunnel for ellie + both phoenix apps"
# flow:
#   1. start ngrok in the background pointing at $ELLIE_AI_PORT
#   2. poll its local api until the public url is up
#   3. write NGROK_URL into apps/ellie_ai/.env so the ellie app picks it up
#      on boot (mise's [env] block also re-loads that file for any task)
#   4. spawn both apps with prefixed logs
#   5. on Ctrl+C, the EXIT trap kills ngrok + both apps together
#
# for an iex'd boot of one app at a time, use `mise run server:resto` /
# `mise run server:ellie` instead.
run = """
set -e

# env-var validation lives in elixir — each app's `<App>.EnvCheck`
# runs on boot and halts with a clean banner if a required var is
# missing. nothing to do here at the shell layer.

if ! command -v ngrok >/dev/null 2>&1; then
  echo "ngrok not found — install with 'brew install ngrok' or see https://ngrok.com/download" >&2
  exit 1
fi

trap 'kill 0 2>/dev/null; pkill -P $$ 2>/dev/null; exit' EXIT INT TERM

# 1. boot ngrok in the background
ngrok http "$ELLIE_AI_PORT" --log=stdout > /tmp/ngrok-ellie.log 2>&1 &

# 2. wait for the local api to come up + grab the https tunnel url
echo "[ngrok] waiting for tunnel..."
url=""
for _ in $(seq 1 30); do
  url=$(curl -s http://127.0.0.1:4040/api/tunnels 2>/dev/null \\
        | grep -oE '"public_url":"https://[^"]+"' \\
        | head -1 \\
        | sed 's/.*"public_url":"//;s/"$//' || true)
  [ -n "$url" ] && break
  sleep 1
done

if [ -z "$url" ]; then
  echo "[ngrok] tunnel didn't open in 30s — see /tmp/ngrok-ellie.log" >&2
  exit 1
fi

# 3. persist NGROK_URL in the root .env so other terminals running
#    `mise run server:ellie` etc. pick it up too. replace-in-place so
#    we don't dogpile duplicate lines.
touch .env
grep -v '^NGROK_URL=' .env > .env.tmp 2>/dev/null || true
echo "NGROK_URL=$url" >> .env.tmp
mv .env.tmp .env
export NGROK_URL="$url"

echo "[ngrok] $url -> http://127.0.0.1:$ELLIE_AI_PORT"

# 4. spawn both phoenix apps with prefixed logs. NGROK_URL is in the env
#    via the export above; PORT vars come from the root `.env` mise loaded.
(cd apps/resto_booking_app && mix phx.server 2>&1 | sed -u 's/^/[resto] /') &
(cd apps/ellie_ai && mix phx.server 2>&1 | sed -u 's/^/[ellie] /') &
wait
"""

[tasks.test]
description = "run tests across every app in the workspace"
run = "mix workspace.run -t test"

[tasks.ci]
description = "simulate the CI run locally (format-check → compile → test)"
# invokes mix directly rather than `mise run <task>` because mise glob-
# matches `test` against `test.watch`, which would drag the watcher into
# the run and fail.
run = [
  "mix workspace.run -t format -- --check-formatted",
  "mix workspace.run -t compile -- --warnings-as-errors",
  "mix workspace.run -t test",
]

[tasks."test.watch"]
description = "watch tests for resto (the app with the bigger suite)"
dir = "apps/resto_booking_app"
run = "mix test.watch"

[tasks.format]
description = "mix format across every app"
run = "mix workspace.run -t format"

[tasks."format.check"]
description = "ci-style formatting check (fails on diffs)"
run = "mix workspace.run -t format -- --check-formatted"

[tasks.compile]
description = "compile every app with --warnings-as-errors"
run = "mix workspace.run -t compile -- --warnings-as-errors"

[tasks.migrate]
description = "run pending migrations across every app"
run = "mix workspace.run -t ecto.migrate"

[tasks."migrate.rollback"]
description = "rollback the last migration in resto"
dir = "apps/resto_booking_app"
run = "mix ecto.rollback"

[tasks.seed]
description = "reseed both apps' dev dbs (resto's 4-day demo window + ellie's orgs/prompts/settings)"
run = """
set -e
echo "[seed] resto:"
(cd apps/resto_booking_app && mix run priv/repo/seeds.exs)
echo "[seed] ellie:"
(cd apps/ellie_ai && mix run priv/repo/seeds.exs)
"""

[tasks.console]
description = "iex console for resto (no server)"
dir = "apps/resto_booking_app"
run = "iex -S mix"

[tasks."console:ellie"]
description = "iex console for ellie_ai (no server)"
dir = "apps/ellie_ai"
run = "iex -S mix"

[tasks."sqlite:reset"]
description = "drop + recreate + migrate + seed both elixir apps' sqlite dbs (destructive — wipes resto + ellie)"
# why both apps: ellie's call rows / customer_summary mirror only make
# sense alongside the resto state they were derived from. resetting one
# without the other leaves stale references and orphaned `status:
# active` call rows in ellie's homepage. keep them in lockstep.
#
# this task targets the elixir apps' on-disk sqlite stores only. for the
# core stack's mysql container + duckdb file see `db:nuke`.
run = """
set -e
echo "[sqlite:reset] resto: drop + create + migrate + seed"
(cd apps/resto_booking_app && \\
  mix ecto.drop --force --quiet && \\
  mix ecto.create --quiet && \\
  mix ecto.migrate --quiet && \\
  mix run priv/repo/seeds.exs)
echo "[sqlite:reset] ellie: drop + create + migrate + seed"
(cd apps/ellie_ai && \\
  mix ecto.drop --force --quiet && \\
  mix ecto.create --quiet && \\
  mix ecto.migrate --quiet && \\
  mix run priv/repo/seeds.exs)
echo "[sqlite:reset] done."
"""

[tasks.deps]
description = "fetch + compile deps in every app"
run = [
  "mix deps.get",
  "mix workspace.run -t deps.compile",
]

# ── core packages (scaffold — not wired into deploy yet) ─────────────────
# these tasks exist so `mise tasks` lists every entrypoint in the monorepo
# even before the packages have real code in them. each one is safe to run
# on the empty scaffold (rspack serve starts a dev server, cargo run prints
# a stub line, uv runs nothing useful yet).

[tasks."web:dev"]
description = "core/frontend dev server (rspack, app.sf-voice.sh)"
dir = "core/frontend"
run = "pnpm dev"

[tasks."web:build"]
description = "core/frontend production build"
dir = "core/frontend"
run = "pnpm build"

[tasks."web:typecheck"]
description = "tsc --noEmit for core/frontend"
dir = "core/frontend"
run = "pnpm typecheck"

[tasks."api:dev"]
description = "core/backend/api — cargo run (api.sf-voice.sh)"
run = "cargo run -p sf-voice-api"

[tasks."api:build"]
description = "core/backend/api — cargo build --release"
run = "cargo build -p sf-voice-api --release"

[tasks."inference:install"]
description = "core/inference — sync python deps (placeholder)"
dir = "core/inference"
run = "echo 'inference scaffold — wire uv/pip once dependencies exist'"

# ── monorepo-wide install + dev loop ─────────────────────────────────────
# `mise run install` is the one-shot bootstrap for every stack. `mise run
# core:dev` brings up the data layer (docker compose), then spawns
# frontend + backend (+ inference placeholder) with prefixed logs.
#
# data-layer lifecycle lives under `db:*` (mysql container + duckdb file,
# the core stack's stores):
#   - `db:start`  — bring up mysql; ensure ./data/ exists for duckdb
#   - `db:stop`   — halt mysql, keep volume
#   - `db:nuke`   — destructive: wipe mysql volume + delete duckdb file
#   - `db:logs`   — tail container logs (mysql only)
#
# (the elixir apps' sqlite stores are reset via `sqlite:reset`, which is
# unrelated to docker.)

[tasks.install]
description = "one-time bootstrap: tool versions, then deps for every stack"
run = """
set -e

echo "[install] mise tools"
mise install

echo "[install] elixir deps"
mix deps.get

echo "[install] frontend deps (pnpm)"
(cd core/frontend && pnpm install)

echo "[install] rust deps (cargo fetch)"
cargo fetch

echo "[install] inference (placeholder — no python deps yet)"
# uv sync goes here once core/inference has real dependencies.

echo "[install] pull dev data-layer images"
docker compose -f infra/dev/docker-compose.yml pull

echo "[install] ensure duckdb data dir exists"
mkdir -p data

echo "[install] done."
"""

[tasks."core:dev"]
description = "full core stack: mysql + duckdb + frontend + backend (+ inference)"
# flow:
#   1. bring up mysql via docker compose; ensure ./data/ exists for the
#      duckdb file (rust opens it in-process on first write).
#   2. wait for mysql healthcheck.
#   3. spawn frontend, backend, inference with prefixed logs.
#   4. on Ctrl+C, the EXIT trap kills the foreground processes; mysql
#      stays up (use `mise run db:stop` to halt it).
run = """
set -e

COMPOSE="docker compose -f infra/dev/docker-compose.yml"

if ! command -v docker >/dev/null 2>&1; then
  echo "docker not found — install Docker Desktop or colima first" >&2
  exit 1
fi

trap 'kill 0 2>/dev/null; pkill -P $$ 2>/dev/null; exit' EXIT INT TERM

mkdir -p data

echo "[core:dev] starting data layer (mysql)..."
# --wait blocks until every service with a healthcheck is healthy (or
# the timeout fires). much more reliable than polling `docker compose ps`
# json, which has fragile schemas across compose versions. healthcheck
# start_period in the compose file already gives cold-init enough room.
if ! $COMPOSE up -d --wait --wait-timeout 180; then
  echo "[core:dev] data layer didn't come up — recent logs:" >&2
  $COMPOSE logs --tail=40 mysql >&2 || true
  exit 1
fi
echo "[core:dev] data layer healthy"

# 3. banner with every url up front, so a slow cargo first-build doesn't
#    leave the user wondering where to look.
echo ""
echo "[core:dev] services:"
echo "  web     → http://localhost:5173   (app.sf-voice.sh)"
echo "  api     → http://localhost:8080   (api.sf-voice.sh)   curl /api/hello"
echo "  mysql   → mysql://sf_voice:sf_voice@127.0.0.1:3306/sf_voice_dev"
echo "  duckdb  → file: ./data/sf_voice.duckdb (open with: duckdb data/sf_voice.duckdb)"
echo ""

# 4. app processes. each backgrounded with a sed prefix so logs interleave
#    cleanly. inference is a placeholder loop until there's real code.
(cd core/frontend && pnpm dev 2>&1 | sed -u 's/^/[web]    /') &
(cargo run -p sf-voice-api 2>&1 | sed -u 's/^/[api]    /') &
( while true; do echo "[inf]    scaffold — no inference process yet"; sleep 300; done ) &
wait
"""

[tasks."db:start"]
description = "start the dev data layer (mysql in docker, duckdb is just a file)"
run = """
mkdir -p data
docker compose -f infra/dev/docker-compose.yml up -d
"""

[tasks."db:stop"]
description = "stop the dev data layer (mysql). volume preserved."
run = "docker compose -f infra/dev/docker-compose.yml down"

[tasks."db:nuke"]
description = "destructive — wipe mysql volume + delete the duckdb file"
run = """
docker compose -f infra/dev/docker-compose.yml down -v
rm -f data/sf_voice.duckdb data/sf_voice.duckdb.wal
"""

[tasks."db:logs"]
description = "tail mysql container logs"
run = "docker compose -f infra/dev/docker-compose.yml logs -f"
