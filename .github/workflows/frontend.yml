name: frontend

on:
   workflow_dispatch: {}
   pull_request:
      paths:
         - "core"
         - "core/frontend/**"
         - "pnpm-lock.yaml"
         - "pnpm-workspace.yaml"
         - "infra/deploy/compose.prod.yml"
         - "infra/deploy/sfctl.sh"
         - "infra/deploy/sfctl.d/**"
         - ".github/workflows/frontend.yml"
         - ".github/workflows/deploy-console.yml"
   merge_group:
      types: [checks_requested]
   push:
      branches: [main]
      paths:
         - "core"
         - "core/frontend/**"
         - "pnpm-lock.yaml"
         - "pnpm-workspace.yaml"
         - "infra/deploy/compose.prod.yml"
         - "infra/deploy/sfctl.sh"
         - "infra/deploy/sfctl.d/**"
         - ".github/workflows/frontend.yml"
         - ".github/workflows/deploy-console.yml"

concurrency:
   group: frontend-${{ github.ref }}
   cancel-in-progress: false

jobs:
   test:
      name: test
      if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
           with:
              submodules: true
              token: ${{ secrets.GH_PAT }}

         - name: setup pnpm + node
           uses: actions/setup-node@v4
           with:
              node-version: "22"

         - name: enable corepack
           run: corepack enable

         - name: cache pnpm store
           uses: actions/cache@v4
           with:
              path: ~/.local/share/pnpm/store
              key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
              restore-keys: |
                 pnpm-${{ runner.os }}-

         - name: install deps (frontend workspace)
           run: pnpm install --frozen-lockfile --filter @sf-voice/frontend...

         - name: typecheck
           run: pnpm --filter @sf-voice/frontend typecheck

         - name: build
           run: pnpm --filter @sf-voice/frontend build

   build:
      name: build image
      if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      permissions:
         contents: read
         packages: write
      steps:
         - uses: actions/checkout@v4
           with:
              submodules: true
              token: ${{ secrets.GH_PAT }}

         - name: set up buildx
           uses: docker/setup-buildx-action@v3

         - name: log in to ghcr
           uses: docker/login-action@v3
           with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

         - name: build and push image
           uses: docker/build-push-action@v6
           with:
              context: .
              file: core/frontend/Dockerfile
              push: true
              tags: |
                 ghcr.io/sf-voice/sf-voice-frontend:latest
                 ghcr.io/sf-voice/sf-voice-frontend:sha-${{ github.sha }}
              build-args: |
                 GIT_SHA=${{ github.sha }}
                 IMAGE_TAG=sha-${{ github.sha }}
                 BUILT_AT=${{ github.event.head_commit.timestamp || github.sha }}
              labels: |
                 org.opencontainers.image.revision=${{ github.sha }}
                 org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
              cache-from: type=gha,scope=frontend
              cache-to: type=gha,mode=max,scope=frontend

   deploy:
      name: deploy
      needs: build
      if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
      uses: ./.github/workflows/deploy-console.yml
      with:
         operation: deploy
         service: frontend
         tag: sha-${{ github.sha }}
      secrets: inherit
