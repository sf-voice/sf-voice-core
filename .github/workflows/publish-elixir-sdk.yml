name: publish elixir sdk

on:
   push:
      tags:
         - "elixir/v*"
   workflow_dispatch:
      inputs:
         version:
            description: "Version to publish (e.g. 0.1.1)"
            required: true


concurrency:
   group: publish-elixir-sdk-${{ github.ref }}
   cancel-in-progress: false

jobs:
   publish:
      name: publish to hex
      runs-on: ubuntu-latest
      environment: sdk-hex
      permissions:
         contents: read
      defaults:
         run:
            working-directory: elixir/sf_voice
      steps:
         - uses: actions/checkout@v4

         - name: resolve version
           run: |
              if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
              else
                echo "VERSION=${GITHUB_REF_NAME#elixir/v}" >> "$GITHUB_ENV"
              fi

         - name: setup elixir + otp
           uses: erlef/setup-beam@v1
           with:
              elixir-version: "1.18.4"
              otp-version: "27.3.4"

         - name: verify tag version
           run: |
              set -euo pipefail
              TAG_VERSION="$VERSION"
              PACKAGE_VERSION="$(sed -n 's/.*@version "\([^"]*\)".*/\1/p' mix.exs | head -1)"
              if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
                echo "tag version $TAG_VERSION does not match mix.exs version $PACKAGE_VERSION"
                exit 1
              fi

         - name: install deps
           run: |
              mix local.hex --force
              mix local.rebar --force
              mix deps.get

         - name: compile
           run: mix compile --warnings-as-errors

         - name: publish
           env:
              HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
           run: mix hex.publish --yes
