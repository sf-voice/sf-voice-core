name: publish rust sdk

on:
   push:
      tags:
         - "rust/v*"

concurrency:
   group: publish-rust-sdk-${{ github.ref }}
   cancel-in-progress: false

jobs:
   publish:
      name: publish to crates.io
      runs-on: ubuntu-latest
      environment: sdk-crates
      permissions:
         contents: read
      steps:
         - uses: actions/checkout@v4

         - name: install rust toolchain
           uses: dtolnay/rust-toolchain@stable
           with:
              components: clippy, rustfmt

         - name: verify tag version
           run: |
              set -euo pipefail
              TAG_VERSION="${GITHUB_REF_NAME#rust/v}"
              PACKAGE_VERSION="$(awk -F'"' '/^version = / { print $2; exit }' rust/Cargo.toml)"
              if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
                echo "tag version $TAG_VERSION does not match Cargo.toml version $PACKAGE_VERSION"
                exit 1
              fi

         - name: prepare standalone package
           run: |
              SDK_DIR="$(mktemp -d)"
              cp -R rust/. "$SDK_DIR"
              echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"

         - name: cargo fmt
           run: |
              cd "$SDK_DIR"
              cargo fmt -- --check

         - name: cargo clippy
           run: |
              cd "$SDK_DIR"
              cargo clippy --all-targets -- -D warnings

         - name: cargo test
           run: |
              cd "$SDK_DIR"
              cargo test --lib

         - name: publish
           env:
              CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
           run: |
              cd "$SDK_DIR"
              cargo publish
