name: publish python sdk

on:
   push:
      tags:
         - "python/v*"
   workflow_dispatch:
      inputs:
         version:
            description: "Version to publish (e.g. 0.1.1)"
            required: true


concurrency:
   group: publish-python-sdk-${{ github.ref }}
   cancel-in-progress: false

jobs:
   publish:
      name: publish to pypi
      runs-on: ubuntu-latest
      environment: sdk-pypi
      permissions:
         contents: read
         id-token: write
      steps:
         - uses: actions/checkout@v4

         - name: resolve version
           run: |
              if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
              else
                echo "VERSION=${GITHUB_REF_NAME#python/v}" >> "$GITHUB_ENV"
              fi

         - name: setup python
           uses: actions/setup-python@v5
           with:
              python-version: "3.12"

         - name: verify tag version
           run: |
              set -euo pipefail
              TAG_VERSION="$VERSION"
              PACKAGE_VERSION="$(python - <<'PY'
              import pathlib
              import tomllib

              data = tomllib.loads(pathlib.Path("python/pyproject.toml").read_text())
              print(data["project"]["version"])
              PY
              )"
              if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
                echo "tag version $TAG_VERSION does not match pyproject.toml version $PACKAGE_VERSION"
                exit 1
              fi

         - name: build
           working-directory: python
           run: |
              python -m pip install --upgrade pip build
              python -m compileall -q sf_voice
              python -m build

         - name: publish
           uses: pypa/gh-action-pypi-publish@release/v1
           with:
              packages-dir: python/dist
