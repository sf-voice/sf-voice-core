name: resto-booking-app

# only fires when this app's code, the shared infra/deploy/ infra, or this workflow
# itself changes. ellie-ai's pipeline has its own filter so a change to one
# app never rebuilds the other.

on:
  pull_request:
    paths:
      - "apps/resto_booking_app/**"
      - "infra/deploy/**"
      - ".github/workflows/resto-booking-app.yml"
  push:
    branches: [main]
    paths:
      - "apps/resto_booking_app/**"
      - "infra/deploy/**"
      - ".github/workflows/resto-booking-app.yml"

concurrency:
  group: deploy-resto-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sf-voice/restaurant-booking-app
  ELIXIR_VERSION: "1.18.4"
  OTP_VERSION: "27.3.4"
  APP_DIR: apps/resto_booking_app

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: install elixir + otp
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      # ecto_sqlite3 (via exqlite) ships a C nif that needs a real compiler.
      # ubuntu-latest doesn't include build-essential in every image, so install
      # it explicitly to keep the build deterministic.
      - name: install build tools for native nifs
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: cache deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.APP_DIR }}/deps
            ${{ env.APP_DIR }}/_build
          key: mix-resto-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('apps/resto_booking_app/mix.lock') }}
          restore-keys: |
            mix-resto-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: install deps
        run: mix deps.get

      - name: check formatting
        run: mix format --check-formatted

      - name: compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: run tests
        run: mix test

  deploy:
    name: build + deploy
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # build context is the app dir, not the repo root — keeps the docker
      # build context small and ensures the Dockerfile's relative COPY paths
      # match what they were when the app lived at root.
      - name: build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=resto
          cache-to: type=gha,mode=max,scope=resto

      # upload the deploy script + compose file to a path the deploy user
      # owns, so future edits to either ship on the next push without
      # having to ssh in and copy by hand.
      - name: upload deploy assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "infra/deploy/deploy-resto-demo.sh,infra/deploy/docker-compose.app.yml"
          target: "/srv/resto-demo/"
          strip_components: 2

      # render /srv/resto-demo/.env from GH secrets, then run the deploy
      # script. workflow is the source of truth for .env contents —
      # manual edits on the droplet are overwritten on every push.
      - name: deploy via ssh
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN,SECRET_KEY_BASE,INTERNAL_API_TOKEN
          script: |
            cd /srv/resto-demo

            # render .env atomically: write to .env.new, chmod via umask,
            # then mv. printf %s prevents shell expansion inside secrets.
            umask 077
            {
              printf 'SECRET_KEY_BASE=%s\n'    "$SECRET_KEY_BASE"
              printf 'INTERNAL_API_TOKEN=%s\n' "$INTERNAL_API_TOKEN"
            } > .env.new
            mv .env.new .env

            mv -f docker-compose.app.yml docker-compose.yml
            chmod +x deploy-resto-demo.sh
            ./deploy-resto-demo.sh sha-${{ github.sha }}

      - name: smoke check (resto-demo, blocking)
        run: |
          for i in $(seq 1 30); do
            if curl -fsS https://resto-demo.sf-voice.sh/api/menu >/dev/null; then
              echo "resto-demo is live"
              exit 0
            fi
            sleep 2
          done
          echo "smoke check failed — resto-demo.sf-voice.sh didn't respond within 60s"
          exit 1

      # non-blocking — app and api upstreams aren't deployed yet, so the
      # Caddy routes 502 until those stacks land. once they do, flip the
      # `|| true` off so regressions fail the build.
      - name: smoke check (app, non-blocking)
        if: always()
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://app.sf-voice.sh/ || echo "000")
          echo "app.sf-voice.sh → HTTP $status"
          if [[ "$status" =~ ^[23] ]]; then
            echo "app is live"
          else
            echo "::warning::app.sf-voice.sh not live yet (HTTP $status) — non-blocking"
          fi

      - name: smoke check (api, non-blocking)
        if: always()
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://api.sf-voice.sh/ || echo "000")
          echo "api.sf-voice.sh → HTTP $status"
          if [[ "$status" =~ ^[23] ]]; then
            echo "api is live"
          else
            echo "::warning::api.sf-voice.sh not live yet (HTTP $status) — non-blocking"
          fi
