name: resto-booking-app

# only fires when this app's code, the shared infra/deploy/ infra, or this workflow
# itself changes. ellie-ai's pipeline has its own filter so a change to one
# app never rebuilds the other.

on:
  pull_request:
    paths:
      - "apps/resto_booking_app/**"
      - "infra/deploy/**"
      - ".github/workflows/resto-booking-app.yml"
  push:
    branches: [main]
    paths:
      - "apps/resto_booking_app/**"
      - "infra/deploy/**"
      - ".github/workflows/resto-booking-app.yml"

concurrency:
  group: deploy-resto-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sf-voice/restaurant-booking-app
  ELIXIR_VERSION: "1.18.4"
  OTP_VERSION: "27.3.4"
  APP_DIR: apps/resto_booking_app

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: install elixir + otp
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      # ecto_sqlite3 (via exqlite) ships a C nif that needs a real compiler.
      # ubuntu-latest doesn't include build-essential in every image, so install
      # it explicitly to keep the build deterministic.
      - name: install build tools for native nifs
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: cache deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.APP_DIR }}/deps
            ${{ env.APP_DIR }}/_build
          key: mix-resto-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('apps/resto_booking_app/mix.lock') }}
          restore-keys: |
            mix-resto-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: install deps
        run: mix deps.get

      - name: check formatting
        run: mix format --check-formatted

      - name: compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: run tests
        run: mix test

  deploy:
    name: build + deploy
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # build context is the app dir, not the repo root — keeps the docker
      # build context small and ensures the Dockerfile's relative COPY paths
      # match what they were when the app lived at root.
      - name: build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=resto
          cache-to: type=gha,mode=max,scope=resto

      - name: deploy via ssh
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            /usr/local/bin/deploy-resto-demo.sh sha-${{ github.sha }}

      - name: smoke check
        run: |
          for i in $(seq 1 30); do
            if curl -fsS https://resto-demo.sf-voice.sh/api/menu >/dev/null; then
              echo "site is live"
              exit 0
            fi
            sleep 2
          done
          echo "smoke check failed — resto-demo.sf-voice.sh didn't respond within 60s"
          exit 1
