name: resto-booking-app

on:
  pull_request:
    paths:
      - "apps/resto_booking_app/**"
      - "infra/deploy/compose.prod.yml"
      - "infra/deploy/sfctl.sh"
      - "infra/deploy/sfctl.d/**"
      - ".github/workflows/resto-booking-app.yml"
      - ".github/workflows/deploy-console.yml"
  push:
    branches: [main]
    paths:
      - "apps/resto_booking_app/**"
      - "infra/deploy/compose.prod.yml"
      - "infra/deploy/sfctl.sh"
      - "infra/deploy/sfctl.d/**"
      - ".github/workflows/resto-booking-app.yml"
      - ".github/workflows/deploy-console.yml"

concurrency:
  group: resto-${{ github.ref }}
  cancel-in-progress: false

env:
  ELIXIR_VERSION: "1.18.4"
  OTP_VERSION: "27.3.4"
  APP_DIR: apps/resto_booking_app

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: install elixir + otp
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: install build tools for native nifs
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: cache deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.APP_DIR }}/deps
            ${{ env.APP_DIR }}/_build
          key: mix-resto-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('apps/resto_booking_app/mix.lock') }}
          restore-keys: |
            mix-resto-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: install deps
        run: mix deps.get

      - name: format
        run: mix format

      - name: compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: run tests
        run: mix test

  build:
    name: build image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          push: true
          tags: |
            ghcr.io/sf-voice/restaurant-booking-app:latest
            ghcr.io/sf-voice/restaurant-booking-app:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=resto
          cache-to: type=gha,mode=max,scope=resto

  deploy:
    name: deploy
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-console.yml
    with:
      operation: deploy
      service: resto
      tag: sha-${{ github.sha }}
    secrets: inherit
