name: go-signoz

on:
   pull_request:
      paths:
         - "go-signoz/**"
         - ".github/workflows/go-signoz.yml"
   push:
      branches: [main]
      paths:
         - "go-signoz/**"
         - ".github/workflows/go-signoz.yml"

concurrency:
   group: go-signoz-${{ github.ref }}
   cancel-in-progress: false

jobs:
   test:
      name: test
      runs-on: ubuntu-latest
      defaults:
         run:
            working-directory: go-signoz
      steps:
         - uses: actions/checkout@v4

         - name: setup go
           uses: actions/setup-go@v5
           with:
              go-version: "1.21"
              cache-dependency-path: go-signoz/go.mod

         - name: check formatting
           run: |
              unformatted="$(gofmt -l .)"
              if [ -n "$unformatted" ]; then
                echo "::error::gofmt needed on:"; echo "$unformatted"; exit 1
              fi

         - name: vet
           run: go vet ./...

         - name: build
           run: go build ./...

         - name: test
           run: go test -race ./...

         - name: cross-compile (windows, darwin)
           run: |
              GOOS=windows GOARCH=amd64 go build ./...
              GOOS=darwin GOARCH=arm64 go build ./...
