name: publish go sdk

on:
   push:
      tags:
         - "go/v*"
   workflow_dispatch:
      inputs:
         version:
            description: "Version to publish (e.g. 0.1.1)"
            required: true


concurrency:
   group: publish-go-sdk-${{ github.ref }}
   cancel-in-progress: false

jobs:
   verify:
      name: verify go module tag
      runs-on: ubuntu-latest
      permissions:
         contents: read
      steps:
         - uses: actions/checkout@v4

         - name: resolve version
           run: |
              if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
              else
                echo "VERSION=${GITHUB_REF_NAME#go/v}" >> "$GITHUB_ENV"
              fi

         - name: setup go
           uses: actions/setup-go@v5
           with:
              go-version: "1.21"
              cache-dependency-path: go/go.mod

         - name: vet
           working-directory: go
           run: go vet ./...

         - name: test
           working-directory: go
           run: go test ./...
