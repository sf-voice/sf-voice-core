name: caddy

on:
  push:
    branches: [main]
    paths:
      - "infra/deploy/Caddyfile"
      - "infra/deploy/compose.prod.yml"
      - "infra/deploy/sfctl.sh"
      - "infra/deploy/sfctl.d/**"
      - ".github/workflows/caddy.yml"
      - ".github/workflows/deploy-console.yml"
  pull_request:
    paths:
      - "infra/deploy/Caddyfile"
      - "infra/deploy/compose.prod.yml"
      - "infra/deploy/sfctl.sh"
      - "infra/deploy/sfctl.d/**"
      - ".github/workflows/caddy.yml"
      - ".github/workflows/deploy-console.yml"

concurrency:
  group: caddy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate Caddyfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: caddy validate
        run: |
          mkdir -p /tmp/certs /tmp/previews
          touch /tmp/previews/empty.caddy
          openssl req -x509 -newkey rsa:2048 \
            -keyout /tmp/certs/origin.key \
            -out /tmp/certs/origin.pem \
            -days 1 -nodes -subj '/CN=ci'
          docker run --rm \
            -v "$PWD/infra/deploy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -v "/tmp/previews:/etc/caddy/previews:ro" \
            -v "/tmp/certs:/etc/caddy/certs:ro" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile

  deploy:
    name: deploy
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-console.yml
    with:
      operation: deploy
      service: caddy
      tag: latest
    secrets: inherit
