name: caddy

on:
  push:
    branches: [main]
    paths:
      - "infra/deploy/Caddyfile"
      - ".github/workflows/caddy.yml"
  pull_request:
    paths:
      - "infra/deploy/Caddyfile"
      - ".github/workflows/caddy.yml"

concurrency:
  group: caddy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate Caddyfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: caddy validate
        run: |
          mkdir -p /tmp/certs /tmp/previews
          touch /tmp/previews/empty.caddy
          openssl req -x509 -newkey rsa:2048 \
            -keyout /tmp/certs/origin.key \
            -out /tmp/certs/origin.pem \
            -days 1 -nodes -subj '/CN=ci'
          docker run --rm \
            -v "$PWD/infra/deploy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -v "/tmp/previews:/etc/caddy/previews:ro" \
            -v "/tmp/certs:/etc/caddy/certs:ro" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile

  deploy:
    name: reload caddy config
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: upload Caddyfile
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "infra/deploy/Caddyfile"
          target: "/tmp/sf-voice-caddy-update/"
          strip_components: 2
          rm: true

      - name: install and reload
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            install -m 644 /tmp/sf-voice-caddy-update/Caddyfile /srv/sf-voice/caddy/Caddyfile
            rm -rf /tmp/sf-voice-caddy-update
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile
            echo "caddy config reloaded"
