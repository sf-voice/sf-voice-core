name: sf-voice-api

on:
   workflow_dispatch: {}
   pull_request:
      paths:
         - "core"
         - "core/backend/**"
         - "Cargo.toml"
         - "Cargo.lock"
         - "infra/deploy/compose.prod.yml"
         - "infra/deploy/sfctl.sh"
         - "infra/deploy/sfctl.d/**"
         - ".github/workflows/sf-voice-api.yml"
         - ".github/workflows/deploy-console.yml"
   merge_group:
      types: [checks_requested]
   push:
      branches: [main]
      paths:
         - "core"
         - "core/backend/**"
         - "Cargo.toml"
         - "Cargo.lock"
         - "infra/deploy/compose.prod.yml"
         - "infra/deploy/sfctl.sh"
         - "infra/deploy/sfctl.d/**"
         - ".github/workflows/sf-voice-api.yml"
         - ".github/workflows/deploy-console.yml"

concurrency:
   group: api-${{ github.ref }}
   cancel-in-progress: false

jobs:
   test:
      name: test
      if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
      runs-on: ubuntu-latest
      env:
         CARGO_INCREMENTAL: 0          # incremental only bloats the CI cache
         CARGO_PROFILE_DEV_DEBUG: 0    # no debuginfo -> faster codegen, smaller target/ cache
         CARGO_PROFILE_TEST_DEBUG: 0   # use "line-tables-only" if you want test backtraces
         CARGO_TERM_COLOR: always
      steps:
         - uses: actions/checkout@v4
           with:
              submodules: true
              token: ${{ secrets.GH_PAT }}

         - name: install rust toolchain
           uses: dtolnay/rust-toolchain@stable
           with:
              components: clippy, rustfmt

         - name: install build tools
           # mold + clang back the linker setting in .cargo/config.toml.
           # without them cargo falls back to the default linker silently.
           run: sudo apt-get update && sudo apt-get install -y build-essential cmake mold clang

         - name: cache cargo + target
           uses: Swatinem/rust-cache@v2
           with:
              # stable key shared across PR + merge_group runs of this job
              # so cargo-target survives runs that change source but not deps.
              # (the `build` job uses docker layer cache, not rust-cache —
              # different cache system, can't share with cargo here.)
              shared-key: sf-voice-api-backend
              cache-all-crates: false

         - name: cargo fmt
           run: cargo fmt --all

         - name: cargo clippy
           run: cargo clippy -p sf-voice-api -p entities -p migration --all-targets -- -D warnings

         - name: cargo test (nextest)
           run: cargo nextest run -p sf-voice-api -p entities -p migration

         # docker image build dropped from PR — cargo above already proves
         # the code compiles. dockerfile-only changes are still validated
         # because the push-to-main `build` job will fail fast if the image
         # can't assemble, and cargo-chef + gha mode=max keeps that fast.

   build:
      name: build image
      if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      permissions:
         contents: read
         packages: write
      steps:
         - uses: actions/checkout@v4
           with:
              submodules: true
              token: ${{ secrets.GH_PAT }}

         - name: set up buildx
           uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

         - name: log in to ghcr
           uses: docker/login-action@v3
           with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

         - name: build and push image
           uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
           with:
              context: .
              file: core/backend/api/Dockerfile
              push: true
              tags: |
                 ghcr.io/sf-voice/sf-voice-api:latest
                 ghcr.io/sf-voice/sf-voice-api:sha-${{ github.sha }}
              labels: |
                 org.opencontainers.image.revision=${{ github.sha }}
                 org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
              cache-from: type=gha,scope=sf-voice-api
              cache-to: type=gha,mode=max,scope=sf-voice-api

   deploy:
      name: deploy
      needs: build
      if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
      uses: ./.github/workflows/deploy-console.yml
      with:
         operation: deploy
         service: api
         tag: sha-${{ github.sha }}
      secrets: inherit
