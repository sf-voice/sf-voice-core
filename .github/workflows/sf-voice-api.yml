name: sf-voice-api

# fires when the rust workspace or this app's source changes. ellie /
# resto pipelines have their own filters so the three services build
# independently.

on:
   workflow_dispatch: {}
   pull_request:
      paths:
         - "core"
         - "core/backend/**"
         - "Cargo.toml"
         - "Cargo.lock"
         - "infra/deploy/docker-compose.api.yml"
         - ".github/workflows/sf-voice-api.yml"
   push:
      branches: [main]
      paths:
         - "core"
         - "core/backend/**"
         - "Cargo.toml"
         - "Cargo.lock"
         - "infra/deploy/docker-compose.api.yml"
         - ".github/workflows/sf-voice-api.yml"

concurrency:
   group: deploy-api-${{ github.ref }}
   cancel-in-progress: false

env:
   REGISTRY: ghcr.io
   IMAGE_NAME: sf-voice/sf-voice-api

jobs:
   test:
      name: test
      runs-on: depot-ubuntu-24.04
      steps:
         - uses: actions/checkout@v4
           with:
              # core/ is a private submodule in a separate repo. GITHUB_TOKEN
              # is scoped to sf-voice-core only — GH_PAT is a fine-grained PAT
              # with Contents:Read on both sf-voice-core and core. checkout
              # rewrites the ssh url to https and uses the token automatically.
              submodules: true
              token: ${{ secrets.GH_PAT }}

         - name: install rust toolchain
           uses: dtolnay/rust-toolchain@stable
           with:
              components: clippy, rustfmt

         # duckdb-bundled needs a real c++ toolchain even for `cargo check`.
         - name: install build tools
           run: sudo apt-get update && sudo apt-get install -y build-essential cmake

         - name: cache cargo registry + target
           uses: actions/cache@v4
           with:
              path: |
                 ~/.cargo/registry
                 ~/.cargo/git
                 target
              key: cargo-api-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
              restore-keys: |
                 cargo-api-${{ runner.os }}-

         - name: cargo fmt
           run: cargo fmt --all -- --check

         - name: cargo clippy
           run: cargo clippy --bin sf-voice-api -- -D warnings

         - name: cargo test
           run: cargo test --bin sf-voice-api

   deploy:
      name: build + deploy
      needs: test
      if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
      runs-on: depot-ubuntu-24.04
      permissions:
         contents: read
         packages: write
      steps:
         - uses: actions/checkout@v4
           with:
              # same as the test job — Dockerfile is at core/backend/api/Dockerfile
              # so the submodule must be populated for the build context to work.
              submodules: true
              token: ${{ secrets.GH_PAT }}

         - name: set up buildx
           uses: docker/setup-buildx-action@v3

         - name: log in to ghcr
           uses: docker/login-action@v3
           with:
              registry: ${{ env.REGISTRY }}
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

         - name: build and push image
           uses: docker/build-push-action@v6
           with:
              context: .
              file: core/backend/api/Dockerfile
              push: true
              tags: |
                 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
              cache-from: type=gha,scope=sf-voice-api
              cache-to: type=gha,mode=max,scope=sf-voice-api

         - name: upload deploy assets
           uses: appleboy/scp-action@v0.1.7
           with:
              host: ${{ secrets.DROPLET_HOST }}
              username: deploy
              key: ${{ secrets.DROPLET_SSH_KEY }}
              source: "infra/deploy/docker-compose.api.yml"
              target: "/srv/sf-voice-api/"
              strip_components: 2

         - name: deploy via ssh
           uses: appleboy/ssh-action@v1.2.0
           env:
              GHCR_USER: ${{ github.actor }}
              GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              DATABASE_URL: ${{ secrets.DATABASE_URL }}
              INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
           with:
              host: ${{ secrets.DROPLET_HOST }}
              username: deploy
              key: ${{ secrets.DROPLET_SSH_KEY }}
              envs: GHCR_USER,GHCR_TOKEN,DATABASE_URL,INTERNAL_API_TOKEN
              script: |
                 cd /srv/sf-voice-api

                 # render .env atomically. printf %s prevents shell
                 # expansion inside secret values.
                 #
                 # INTERNAL_API_TOKEN is the bearer the rust client sends
                 # when joining ellie's VAD websocket — same value ellie
                 # checks in EllieAiWeb.VadSocket.connect/3.
                 umask 077
                 {
                   printf 'DATABASE_URL=%s\n'       "$DATABASE_URL"
                   printf 'INTERNAL_API_TOKEN=%s\n' "$INTERNAL_API_TOKEN"
                 } > .env.new
                 mv .env.new .env

                 # rename compose to what compose looks for by default
                 mv -f docker-compose.api.yml docker-compose.yml

                 # ghcr login + pull + recreate
                 echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

                 sed -i.bak -E \
                   "s|(image: ghcr\\.io/sf-voice/sf-voice-api:)[^[:space:]]+|\\1sha-${{ github.sha }}|" \
                   docker-compose.yml
                 rm -f docker-compose.yml.bak

                 docker compose pull api

                 # run pending migrations before restarting the service.
                 # non-zero exit aborts the deploy so the old container keeps serving.
                 docker run --rm \
                   --env-file .env \
                   --network proxy_net \
                   "ghcr.io/sf-voice/sf-voice-api:sha-${{ github.sha }}" \
                   /usr/local/bin/migrate up

                 docker compose up -d --no-deps api

                 # trim old images
                 docker image prune -f --filter "until=168h" >/dev/null 2>&1 || true

                 docker compose ps api

         - name: smoke check
           run: |
              for i in $(seq 1 30); do
                if curl -fsS https://app.sf-voice.sh/healthz >/dev/null; then
                  echo "api is live"
                  exit 0
                fi
                sleep 2
              done
              echo "smoke check failed — app.sf-voice.sh/healthz didn't respond within 60s"
              exit 1
