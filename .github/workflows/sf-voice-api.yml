name: sf-voice-api

on:
   workflow_dispatch: {}
   pull_request:
      paths:
         - "core"
         - "core/backend/**"
         - "Cargo.toml"
         - "Cargo.lock"
         - "infra/deploy/compose.prod.yml"
         - "infra/deploy/sfctl.sh"
         - "infra/deploy/sfctl.d/**"
         - ".github/workflows/sf-voice-api.yml"
         - ".github/workflows/deploy-console.yml"
   merge_group:
      types: [checks_requested]
   push:
      branches: [main]
      paths:
         - "core"
         - "core/backend/**"
         - "Cargo.toml"
         - "Cargo.lock"
         - "infra/deploy/compose.prod.yml"
         - "infra/deploy/sfctl.sh"
         - "infra/deploy/sfctl.d/**"
         - ".github/workflows/sf-voice-api.yml"
         - ".github/workflows/deploy-console.yml"

concurrency:
   group: api-${{ github.ref }}
   cancel-in-progress: false

jobs:
   test:
      name: test
      if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
      runs-on: ubuntu-latest
      env:
         CARGO_INCREMENTAL: 0          # incremental only bloats the CI cache
         CARGO_PROFILE_DEV_DEBUG: 0    # no debuginfo -> faster codegen, smaller target/ cache
         CARGO_PROFILE_TEST_DEBUG: 0   # use "line-tables-only" if you want test backtraces
         CARGO_TERM_COLOR: always
      steps:
         - uses: actions/checkout@v4
           with:
              submodules: true
              token: ${{ secrets.GH_PAT }}

         - name: install rust toolchain
           uses: dtolnay/rust-toolchain@stable
           with:
              components: clippy, rustfmt

         - name: install build tools
           run: sudo apt-get update && sudo apt-get install -y build-essential cmake

         - name: install nextest
           uses: taiki-e/install-action@nextest

         - name: cache cargo + target
           uses: Swatinem/rust-cache@v2
           with:
              cache-all-crates: false

         - name: cargo fmt
           run: cargo fmt --all -- --check

         - name: cargo clippy
           run: cargo clippy -p sf-voice-api -p entities -p migration --all-targets -- -D warnings

         - name: cargo test (nextest)
           run: cargo nextest run -p sf-voice-api -p entities -p migration

   image:
      name: image build
      if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
      runs-on: ubuntu-latest
      permissions:
         contents: read
         id-token: write              # for Depot OIDC; drop if using DEPOT_TOKEN
      steps:
         - uses: actions/checkout@v4
           with:
              submodules: true
              token: ${{ secrets.GH_PAT }}

         - uses: dorny/paths-filter@v3
           id: changes
           with:
              filters: |
                 docker:
                    - 'core/backend/api/Dockerfile'
                    - 'core/backend/api/Dockerfile.dockerignore'

         - name: set up depot
           if: steps.changes.outputs.docker == 'true'
           uses: depot/setup-action@v1

         - name: docker build api image
           if: steps.changes.outputs.docker == 'true'
           uses: depot/build-push-action@v1
           with:
              project: xcbgvmlxvn      # core/depot.json isn't at context root, so pass explicitly
              context: .
              file: core/backend/api/Dockerfile
              push: false
              tags: sf-voice-api:pr-check

   build:
      name: build image
      if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      permissions:
         contents: read
         packages: write
         id-token: write
      steps:
         - uses: actions/checkout@v4
           with:
              submodules: true
              token: ${{ secrets.GH_PAT }}

         - name: set up depot
           uses: depot/setup-action@v1

         - name: log in to ghcr
           uses: docker/login-action@v3
           with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

         - name: build and push image
           uses: depot/build-push-action@v1
           with:
              project: xcbgvmlxvn
              context: .
              file: core/backend/api/Dockerfile
              push: true
              tags: |
                 ghcr.io/sf-voice/sf-voice-api:latest
                 ghcr.io/sf-voice/sf-voice-api:sha-${{ github.sha }}
              labels: |
                 org.opencontainers.image.revision=${{ github.sha }}
                 org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

   deploy:
      name: deploy
      needs: build
      if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
      uses: ./.github/workflows/deploy-console.yml
      with:
         operation: deploy
         service: api
         tag: sha-${{ github.sha }}
      secrets: inherit
