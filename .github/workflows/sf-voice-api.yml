name: sf-voice-api

on:
   workflow_dispatch: {}
   pull_request:
      paths:
         - "core"
         - "core/backend/**"
         - "Cargo.toml"
         - "Cargo.lock"
         - "infra/deploy/compose.prod.yml"
         - "infra/deploy/sfctl.sh"
         - "infra/deploy/sfctl.d/**"
         - ".github/workflows/sf-voice-api.yml"
         - ".github/workflows/deploy-console.yml"
   merge_group:
      types: [checks_requested]
   push:
      branches: [main]
      paths:
         - "core"
         - "core/backend/**"
         - "Cargo.toml"
         - "Cargo.lock"
         - "infra/deploy/compose.prod.yml"
         - "infra/deploy/sfctl.sh"
         - "infra/deploy/sfctl.d/**"
         - ".github/workflows/sf-voice-api.yml"
         - ".github/workflows/deploy-console.yml"

concurrency:
   group: api-${{ github.ref }}
   cancel-in-progress: false

jobs:
   test:
      name: test
      if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
           with:
              submodules: true
              token: ${{ secrets.GH_PAT }}

         - name: install rust toolchain
           uses: dtolnay/rust-toolchain@stable
           with:
              components: clippy, rustfmt

         - name: install build tools
           run: sudo apt-get update && sudo apt-get install -y build-essential cmake

         - name: cache cargo + target
           uses: Swatinem/rust-cache@v2
           with:
              cache-all-crates: false

         - name: cargo fmt
           run: cargo fmt --all -- --check

         - name: cargo clippy
           run: cargo clippy --bin sf-voice-api -- -D warnings

         - name: cargo test
           run: cargo test --bin sf-voice-api

         - name: set up buildx
           uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

         - name: docker build api image
           uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
           with:
              context: .
              file: core/backend/api/Dockerfile
              push: false
              tags: sf-voice-api:pr-check
              cache-from: type=gha,scope=sf-voice-api
              cache-to: type=gha,mode=min,scope=sf-voice-api

   build:
      name: build image
      if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      permissions:
         contents: read
         packages: write
      steps:
         - uses: actions/checkout@v4
           with:
              submodules: true
              token: ${{ secrets.GH_PAT }}

         - name: set up buildx
           uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

         - name: log in to ghcr
           uses: docker/login-action@v3
           with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

         - name: build and push image
           uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
           with:
              context: .
              file: core/backend/api/Dockerfile
              push: true
              tags: |
                 ghcr.io/sf-voice/sf-voice-api:latest
                 ghcr.io/sf-voice/sf-voice-api:sha-${{ github.sha }}
              labels: |
                 org.opencontainers.image.revision=${{ github.sha }}
                 org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
              cache-from: type=gha,scope=sf-voice-api
              cache-to: type=gha,mode=max,scope=sf-voice-api

   deploy:
      name: deploy
      needs: build
      if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
      uses: ./.github/workflows/deploy-console.yml
      with:
         operation: deploy
         service: api
         tag: sha-${{ github.sha }}
      secrets: inherit
