name: publish kotlin sdk

on:
   push:
      tags:
         - "kotlin/v*"

concurrency:
   group: publish-kotlin-sdk-${{ github.ref }}
   cancel-in-progress: false

jobs:
   publish:
      name: publish to maven central
      runs-on: ubuntu-latest
      environment: sdk-maven-central
      permissions:
         contents: read
      defaults:
         run:
            working-directory: kotlin
      steps:
         - uses: actions/checkout@v4

         - name: setup java
           uses: actions/setup-java@v4
           with:
              distribution: temurin
              java-version: "17"

         - name: setup gradle
           uses: gradle/actions/setup-gradle@v4
           with:
              gradle-version: "8.13"

         - name: verify tag version
           run: |
              set -euo pipefail
              TAG_VERSION="${GITHUB_REF_NAME#kotlin/v}"
              PACKAGE_VERSION="$(awk -F'"' '/^version = / { print $2; exit }' build.gradle.kts)"
              if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
                echo "tag version $TAG_VERSION does not match build.gradle.kts version $PACKAGE_VERSION"
                exit 1
              fi

         - name: build local maven repository
           run: gradle --no-daemon clean build publishMavenPublicationToLocalReleaseRepository

         - name: sign and bundle artifacts
           env:
              MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
              MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
           run: |
              set -euo pipefail
              printf '%s' "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --import

              REPO_DIR="build/release-repository"
              find "$REPO_DIR" -name 'maven-metadata*' -delete

              while IFS= read -r -d '' file; do
                gpg --batch --yes --pinentry-mode loopback \
                  --passphrase "$MAVEN_GPG_PASSPHRASE" \
                  --armor --detach-sign "$file"
                md5sum "$file" | awk '{print $1}' > "$file.md5"
                sha1sum "$file" | awk '{print $1}' > "$file.sha1"
                sha256sum "$file" | awk '{print $1}' > "$file.sha256"
                sha512sum "$file" | awk '{print $1}' > "$file.sha512"
              done < <(find "$REPO_DIR" -type f ! -name '*.asc' ! -name '*.md5' ! -name '*.sha1' ! -name '*.sha256' ! -name '*.sha512' -print0)

              (cd "$REPO_DIR" && zip -r ../central-bundle.zip .)

         - name: upload to maven central
           env:
              MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
              MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
           run: |
              set -euo pipefail
              TAG_VERSION="${GITHUB_REF_NAME#kotlin/v}"
              TOKEN="$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64 -w0)"
              DEPLOYMENT_ID="$(
                curl --fail-with-body --silent --show-error \
                  --request POST \
                  --header "Authorization: Bearer $TOKEN" \
                  --form bundle=@build/central-bundle.zip \
                  "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC&name=sf-voice-media-kotlin-$TAG_VERSION"
              )"

              for _ in $(seq 1 60); do
                STATUS_JSON="$(
                  curl --fail-with-body --silent --show-error \
                    --request POST \
                    --header "Authorization: Bearer $TOKEN" \
                    "https://central.sonatype.com/api/v1/publisher/status?id=$DEPLOYMENT_ID"
                )"
                STATE="$(python3 -c 'import json, sys; print(json.load(sys.stdin).get("deploymentState", ""))' <<< "$STATUS_JSON")"
                case "$STATE" in
                  PUBLISHED)
                    echo "maven central deployment published: $DEPLOYMENT_ID"
                    exit 0
                    ;;
                  FAILED)
                    echo "$STATUS_JSON"
                    exit 1
                    ;;
                  *)
                    echo "maven central deployment $DEPLOYMENT_ID is $STATE"
                    sleep 10
                    ;;
                esac
              done

              echo "timed out waiting for maven central deployment $DEPLOYMENT_ID"
              exit 1
