name: pipeline

# tests run on every PR + every push to main; deploy only fires when tests pass
# on a push to main. ssh + image tag are set up so you can re-deploy any past
# commit by re-running the workflow against that sha.

on:
  pull_request:
  push:
    branches: [main]

# avoid simultaneous deploys racing each other; the newest one wins
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sf-voice/restaurant-booking-app
  ELIXIR_VERSION: "1.18.4"
  OTP_VERSION: "27.3.4"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install elixir + otp
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      # ecto_sqlite3 (via exqlite) ships a C nif that needs a real compiler at
      # `mix deps.compile` time. ubuntu-latest doesn't include build-essential
      # in every image; install it explicitly so the build is deterministic.
      - name: install build tools for native nifs
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: install deps
        run: mix deps.get

      - name: check formatting
        run: mix format --check-formatted

      - name: compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: run tests
        run: mix test

  deploy:
    name: build + deploy
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # we tag with both :latest and :sha-<gitsha> so rollbacks can pin to a
      # specific commit instead of "whatever latest used to be"
      - name: build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: deploy via ssh
        uses: appleboy/ssh-action@v1.2.0
        env:
          # the deploy script logs in to ghcr with these so `docker pull` works
          # against the private package. token is ephemeral — expires with the job.
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            /usr/local/bin/deploy-resto-demo.sh sha-${{ github.sha }}

      - name: smoke check
        run: |
          # give the container a beat to come up, then probe the public url
          for i in $(seq 1 30); do
            if curl -fsS https://resto-demo.sf-voice.sh/api/menu >/dev/null; then
              echo "site is live"
              exit 0
            fi
            sleep 2
          done
          echo "smoke check failed — resto-demo.sf-voice.sh didn't respond within 60s"
          exit 1
