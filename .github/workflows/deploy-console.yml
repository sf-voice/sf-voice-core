name: deploy console

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "deploy, rollback, restart, status, logs, or smoke"
        required: true
        default: status
        type: choice
        options: [deploy, rollback, restart, status, logs, smoke]
      service:
        description: "service to operate"
        required: true
        default: ellie
        type: choice
        options: [ellie, resto, caddy]
      tag:
        description: "image tag for deploy/rollback, e.g. sha-abc123"
        required: false
        type: string
      log_lines:
        description: "lines for logs operation"
        required: false
        default: "200"
        type: string
  workflow_call:
    inputs:
      operation:
        required: true
        type: string
      service:
        required: true
        type: string
      tag:
        required: false
        type: string
      log_lines:
        required: false
        default: "200"
        type: string

concurrency:
  # per-service serialization. the env/images.env race is now handled
  # droplet-side via flock in sfctl set_image_tag, so different services
  # can deploy in parallel without losing each other's tag writes. we
  # still queue same-service deploys to avoid two
  # `compose up`s on the same container colliding.
  group: deploy-console-${{ inputs.service || github.event.inputs.service }}
  cancel-in-progress: false

jobs:
  run:
    name: ${{ inputs.operation || github.event.inputs.operation }} ${{ inputs.service || github.event.inputs.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      OPERATION: ${{ inputs.operation || github.event.inputs.operation }}
      SERVICE: ${{ inputs.service || github.event.inputs.service }}
      IMAGE_TAG: ${{ inputs.tag || github.event.inputs.tag }}
      LOG_LINES: ${{ inputs.log_lines || github.event.inputs.log_lines || '200' }}
    steps:
      - uses: actions/checkout@v4

      - name: resolve tag
        run: |
          if [ -z "$IMAGE_TAG" ] && [ "$OPERATION" = "deploy" ]; then
            echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"
          elif [ -z "$IMAGE_TAG" ] && [ "$OPERATION" = "rollback" ]; then
            echo "::error::rollback requires an explicit tag"
            exit 1
          fi

      - name: upload deploy assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "infra/deploy/compose.prod.yml,infra/deploy/compose.preview.yml,infra/deploy/sfctl.sh,infra/deploy/sfctl.d/*.sh,infra/deploy/Caddyfile,infra/deploy/smoke-vad.py"
          target: "/tmp/sf-voice-deploy-assets/"
          strip_components: 2
          rm: true

      - name: run console command
        uses: appleboy/ssh-action@v1.2.0
        env:
          OPERATION: ${{ env.OPERATION }}
          SERVICE: ${{ env.SERVICE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          LOG_LINES: ${{ env.LOG_LINES }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
          TELNYX_PUBLIC_KEY: ${{ secrets.TELNYX_PUBLIC_KEY }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          STAFF_PHONE_E164: ${{ secrets.STAFF_PHONE_E164 }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: OPERATION,SERVICE,IMAGE_TAG,LOG_LINES,GHCR_USER,GHCR_TOKEN,INTERNAL_API_TOKEN,OPENAI_API_KEY,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION,S3_BUCKET_NAME,SECRET_KEY_BASE,TELNYX_API_KEY,TELNYX_PUBLIC_KEY,PHONE_NUMBER,STAFF_PHONE_E164
          script: |
            set -euo pipefail
            asset_dir=/tmp/sf-voice-deploy-assets

            # deploy should be non-root after the droplet has been bootstrapped once.
            if [ ! -d /srv/sf-voice ] || [ ! -w /srv/sf-voice ]; then
              echo "::error::/srv/sf-voice is not writable by deploy. run sfctl bootstrap on the droplet with sudo/root access first."
              exit 1
            fi
            if ! docker ps >/dev/null 2>&1; then
              echo "::error::deploy cannot access docker. add deploy to the docker group on the droplet and start a new ssh session."
              exit 1
            fi

            install -d /srv/sf-voice/bin /srv/sf-voice/caddy/previews /srv/sf-voice/certs
            cd /srv/sf-voice
            install -m 644 "$asset_dir/compose.prod.yml" compose.prod.yml
            install -m 644 "$asset_dir/compose.preview.yml" compose.preview.yml
            install -m 755 "$asset_dir/sfctl.sh" bin/sfctl
            install -d bin/sfctl.d
            cp -R "$asset_dir/sfctl.d/." bin/sfctl.d/
            chmod 644 bin/sfctl.d/*.sh
            install -m 644 "$asset_dir/Caddyfile" caddy/Caddyfile
            install -m 755 "$asset_dir/smoke-vad.py" smoke-vad.py
            rm -rf "$asset_dir"

            case "$OPERATION" in
              deploy|rollback)
                bin/sfctl "$OPERATION" "$SERVICE" "$IMAGE_TAG"
                ;;
              logs)
                bin/sfctl logs "$SERVICE" "$LOG_LINES"
                ;;
              restart|status|smoke)
                bin/sfctl "$OPERATION" "$SERVICE"
                ;;
              *)
                echo "::error::unknown operation $OPERATION"
                exit 1
                ;;
            esac
