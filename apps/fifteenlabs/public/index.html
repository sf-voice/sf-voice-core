<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sf-voice media demo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --border: #2a2d3e;
        --accent: #6c63ff;
        --accent-dim: #4a44cc;
        --text: #e8e8f0;
        --muted: #8888a8;
        --green: #3ecf8e;
        --yellow: #f0c040;
        --red: #f06060;
        --radius: 8px;
        --font: "Inter", system-ui, sans-serif;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
        line-height: 1.6;
        min-height: 100vh;
        padding: 32px 24px;
      }

      header {
        max-width: 760px;
        margin: 0 auto 32px;
      }

      header h1 {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.3px;
      }

      header p {
        color: var(--muted);
        margin-top: 4px;
        font-size: 13px;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        display: grid;
        gap: 24px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px 24px;
      }

      .card h2 {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--muted);
        margin-bottom: 16px;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: stretch;
      }

      input, select {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font);
        font-size: 13px;
        padding: 8px 12px;
        outline: none;
        transition: border-color 0.15s;
        flex: 1;
        min-width: 0;
      }

      input:focus, select:focus {
        border-color: var(--accent);
      }

      select { flex: 0 0 100px; }

      button {
        background: var(--accent);
        border: none;
        border-radius: var(--radius);
        color: #fff;
        cursor: pointer;
        font-family: var(--font);
        font-size: 13px;
        font-weight: 500;
        padding: 8px 16px;
        transition: background 0.15s;
        white-space: nowrap;
      }

      button:hover { background: var(--accent-dim); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }

      .status {
        margin-top: 12px;
        font-size: 13px;
        color: var(--muted);
        min-height: 20px;
      }

      .status.ok    { color: var(--green); }
      .status.busy  { color: var(--yellow); }
      .status.error { color: var(--red); }

      .results { margin-top: 12px; display: grid; gap: 8px; }

      .result-item {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        display: grid;
        grid-template-columns: 48px 1fr auto;
        gap: 8px 12px;
        align-items: start;
      }

      .score {
        font-size: 16px;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        padding-top: 2px;
      }

      .result-meta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 3px;
      }

      .match-type {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        padding: 3px 8px;
        border-radius: 4px;
        background: var(--border);
        color: var(--muted);
        align-self: start;
      }

      .match-type.visual       { color: #7ec8f0; background: #1a2d3a; }
      .match-type.conversation { color: var(--green); background: #1a2d25; }
      .match-type.text_in_video { color: var(--yellow); background: #2d2a1a; }

      .asset-id {
        font-family: monospace;
        font-size: 11px;
        color: var(--muted);
      }

      .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; }

      .assets-list { display: grid; gap: 6px; margin-top: 12px; }

      .asset-row {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px 14px;
        font-size: 12px;
      }

      .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.ready   { background: var(--green); }
      .dot.pending { background: var(--yellow); }
      .dot.indexing { background: var(--yellow); }
      .dot.failed  { background: var(--red); }
    </style>
  </head>
  <body>
    <header>
      <h1>sf-voice media demo</h1>
      <p>ingest a media file, wait for indexing, then run semantic searches across it</p>
    </header>

    <main>
      <!-- ingest -->
      <div class="card">
        <h2>ingest</h2>
        <div class="row">
          <input id="ingest-url" type="url" placeholder="https://example.com/recording.mp4" />
          <select id="media-type">
            <option value="">auto</option>
            <option value="video">video</option>
            <option value="audio">audio</option>
          </select>
          <button id="ingest-btn">ingest</button>
        </div>
        <div id="ingest-status" class="status"></div>
      </div>

      <!-- search -->
      <div class="card">
        <h2>search</h2>
        <div class="row">
          <input id="search-query" type="text" placeholder="someone mentions the product roadmap" />
          <button id="search-btn">search</button>
        </div>
        <div id="results" class="results"></div>
      </div>

      <!-- library -->
      <div class="card">
        <h2>library <button id="refresh-btn" style="margin-left:8px;padding:4px 10px;font-size:11px;background:var(--border);color:var(--muted)">refresh</button></h2>
        <div id="assets-list" class="assets-list"></div>
      </div>
    </main>

    <script type="module">
      const $ = (id) => document.getElementById(id);

      // ── ingest ──────────────────────────────────────────────────────────
      $("ingest-btn").addEventListener("click", async () => {
        const url = $("ingest-url").value.trim();
        if (!url) return;
        const mediaType = $("media-type").value || undefined;

        setStatus("ingest-status", "busy", "submitting…");
        $("ingest-btn").disabled = true;

        try {
          const resp = await post("/ingest", { url, media_type: mediaType });
          setStatus("ingest-status", "busy", `task ${resp.task_id} — polling…`);
          await pollTask(resp.task_id);
          setStatus("ingest-status", "ok", `ready — asset ${resp.asset_id}`);
          loadAssets();
        } catch (err) {
          setStatus("ingest-status", "error", err.message);
        } finally {
          $("ingest-btn").disabled = false;
        }
      });

      async function pollTask(taskId) {
        while (true) {
          const task = await get(`/task/${taskId}`);
          if (task.status === "ready")  return task;
          if (task.status === "failed") throw new Error(task.error ?? "indexing failed");
          setStatus("ingest-status", "busy", `task ${taskId} — ${task.status}…`);
          await sleep(1500);
        }
      }

      // ── search ──────────────────────────────────────────────────────────
      $("search-btn").addEventListener("click", async () => {
        const query = $("search-query").value.trim();
        if (!query) return;

        $("search-btn").disabled = true;
        $("results").innerHTML = "";

        try {
          const { results } = await post("/search", { query });
          if (results.length === 0) {
            $("results").innerHTML = `<div class="empty">no results</div>`;
          } else {
            $("results").innerHTML = results.map(renderResult).join("");
          }
        } catch (err) {
          $("results").innerHTML = `<div class="empty" style="color:var(--red)">${err.message}</div>`;
        } finally {
          $("search-btn").disabled = false;
        }
      });

      function renderResult(r) {
        const start = msToTime(r.start_ms);
        const end   = msToTime(r.end_ms);
        const score = (r.score * 100).toFixed(0) + "%";
        const type  = r.match_type.replace("_", " ");
        return `
          <div class="result-item">
            <div class="score">${score}</div>
            <div>
              <div>${start} – ${end}</div>
              <div class="asset-id">${r.asset_id}</div>
            </div>
            <span class="match-type ${r.match_type}">${type}</span>
          </div>`;
      }

      // ── library ─────────────────────────────────────────────────────────
      $("refresh-btn").addEventListener("click", loadAssets);

      async function loadAssets() {
        try {
          const { items } = await get("/assets");
          const list = $("assets-list");
          if (items.length === 0) {
            list.innerHTML = `<div class="empty">no assets yet</div>`;
          } else {
            list.innerHTML = items.map(renderAsset).join("");
          }
        } catch {}
      }

      function renderAsset(a) {
        const title = a.metadata?.title ?? a.id;
        const dur   = a.duration_ms ? ` · ${msToTime(a.duration_ms)}` : "";
        return `
          <div class="asset-row">
            <div class="dot ${a.status}"></div>
            <span style="flex:1">${title}</span>
            <span class="asset-id">${a.status}${dur}</span>
          </div>`;
      }

      // ── helpers ──────────────────────────────────────────────────────────
      async function post(path, body) {
        const r = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!r.ok) {
          const j = await r.json().catch(() => ({}));
          throw new Error(j?.message ?? `HTTP ${r.status}`);
        }
        return r.json();
      }

      async function get(path) {
        const r = await fetch(path);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      }

      function setStatus(id, cls, text) {
        const el = $(id);
        el.className = `status ${cls}`;
        el.textContent = text;
      }

      function msToTime(ms) {
        const s   = Math.floor(ms / 1000);
        const m   = Math.floor(s / 60);
        const sec = s % 60;
        return `${m}:${String(sec).padStart(2, "0")}`;
      }

      function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

      loadAssets();
    </script>
  </body>
</html>
