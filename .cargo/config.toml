# mold linker for x86_64 linux. cuts release link time ~5-10x vs the
# default ld/lld. only applies to the matching target, so macOS dev
# builds and other targets are untouched.
#
# linux devs need to apt-install mold + clang once:
#   sudo apt-get install -y mold clang
# CI installs them in the workflow before running cargo.
# the api Dockerfile installs them and sets RUSTFLAGS directly.

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
