# installed at /srv/resto-demo/docker-compose.yml on the droplet.
# the deploy script swaps the image tag and re-creates the `app` service.

services:
  app:
    image: ghcr.io/sf-voice/restaurant-booking-app:latest
    container_name: resto-demo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PHX_HOST: resto-demo.do.sf-voice.sh
      PHX_SERVER: "true"
      PORT: "4000"
      DATABASE_PATH: /data/resto.db
      # SECRET_KEY_BASE comes from .env (gitignored, written by bootstrap.sh)
    volumes:
      # host dir is owned by uid 65534 (nobody) so the container can write to it
      - ./data:/data
    expose:
      - "4000"
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
